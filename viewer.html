<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Viewer</title>
    <meta name="color-scheme" content="dark" />
    <style>
      :root {
        --bg: #0b1018;
        --bg-elevated: rgba(19, 26, 39, 0.92);
        --panel: rgba(16, 23, 35, 0.88);
        --panel-strong: rgba(23, 31, 46, 0.96);
        --border: rgba(161, 179, 208, 0.18);
        --border-strong: rgba(161, 179, 208, 0.26);
        --text: #f2f6fb;
        --muted: #9ba9bd;
        --accent: #8bc8ff;
        --accent-strong: #59afff;
        --success: #8bdcb0;
        --danger: #ff9d9d;
        --shadow: 0 30px 60px rgba(0, 0, 0, 0.28);
        --radius-lg: 24px;
        --radius-md: 18px;
        --radius-sm: 12px;
        --content-width: 880px;
        font-family:
          "Pretendard Variable",
          "Pretendard",
          "Noto Sans KR",
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(63, 114, 255, 0.22), transparent 34%),
          radial-gradient(circle at 85% 20%, rgba(47, 196, 255, 0.14), transparent 22%),
          linear-gradient(180deg, #111827 0%, var(--bg) 100%);
      }

      a {
        color: inherit;
      }

      button {
        font: inherit;
      }

      .page {
        width: min(1180px, calc(100% - 28px));
        margin: 28px auto 72px;
      }

      .hero {
        display: grid;
        gap: 20px;
      }

      .hero__panel {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        padding: 18px 20px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .hero__heading {
        min-width: 0;
      }

      .hero__label {
        margin: 0 0 8px;
        font-size: 0.92rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .hero__path {
        margin: 0;
        font-size: clamp(1rem, 1.3vw, 1.16rem);
        font-weight: 700;
        line-height: 1.5;
        word-break: break-all;
      }

      .hero__meta {
        margin: 10px 0 0;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .hero__actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        cursor: pointer;
        transition:
          transform 0.16s ease,
          border-color 0.16s ease,
          background 0.16s ease;
      }

      .button:hover {
        transform: translateY(-1px);
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.06);
      }

      .button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .button--primary {
        background: linear-gradient(135deg, rgba(91, 173, 255, 0.24), rgba(54, 115, 255, 0.2));
        border-color: rgba(122, 179, 255, 0.4);
      }

      .viewer {
        width: min(var(--content-width), 100%);
        margin: 22px auto 0;
      }

      .status {
        display: none;
        margin-bottom: 18px;
        padding: 26px 24px;
        background: var(--panel-strong);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .status.is-visible {
        display: block;
      }

      .status[data-state="loading"] {
        color: var(--accent);
      }

      .status[data-state="error"] {
        color: var(--danger);
      }

      .status[data-state="info"] {
        color: var(--muted);
      }

      .status__title {
        margin: 0 0 10px;
        font-size: clamp(1.2rem, 2vw, 1.9rem);
        color: var(--text);
      }

      .status__body {
        margin: 0;
        font-size: 1rem;
        line-height: 1.7;
        color: inherit;
      }

      .status__actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .card {
        padding: clamp(26px, 5vw, 48px);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
          var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .markdown-body {
        font-size: 1.04rem;
        line-height: 1.9;
        color: #e8eef8;
      }

      .markdown-body > *:first-child {
        margin-top: 0;
      }

      .markdown-body > *:last-child {
        margin-bottom: 0;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4 {
        margin: 2.2em 0 0.8em;
        font-weight: 800;
        line-height: 1.3;
        letter-spacing: -0.02em;
      }

      .markdown-body h1 {
        font-size: clamp(2rem, 4vw, 2.8rem);
        padding-bottom: 0.45em;
        border-bottom: 1px solid var(--border);
      }

      .markdown-body h2 {
        font-size: clamp(1.5rem, 3vw, 2rem);
      }

      .markdown-body h3 {
        font-size: clamp(1.2rem, 2.4vw, 1.45rem);
      }

      .markdown-body p,
      .markdown-body ul,
      .markdown-body ol,
      .markdown-body blockquote,
      .markdown-body table,
      .markdown-body pre {
        margin: 1.1em 0;
      }

      .markdown-body ul,
      .markdown-body ol {
        padding-left: 1.4em;
      }

      .markdown-body li + li {
        margin-top: 0.35em;
      }

      .markdown-body strong {
        color: #ffffff;
      }

      .markdown-body a {
        color: var(--accent);
        text-decoration: none;
      }

      .markdown-body a:hover {
        color: var(--accent-strong);
        text-decoration: underline;
      }

      .markdown-body blockquote {
        padding: 0.9em 1.1em;
        border-left: 4px solid rgba(139, 200, 255, 0.72);
        border-radius: 0 14px 14px 0;
        background: rgba(128, 183, 255, 0.09);
        color: #d9e7fb;
      }

      .markdown-body code {
        padding: 0.18em 0.42em;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        font-family:
          "Cascadia Code",
          "Fira Code",
          Consolas,
          monospace;
        font-size: 0.92em;
      }

      .markdown-body pre {
        padding: 18px;
        overflow-x: auto;
        border: 1px solid rgba(133, 153, 184, 0.16);
        border-radius: 18px;
        background: #0b1220;
      }

      .markdown-body pre code {
        padding: 0;
        background: transparent;
        font-size: 0.94rem;
      }

      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 16px;
        border-style: hidden;
        box-shadow: 0 0 0 1px var(--border);
      }

      .markdown-body th,
      .markdown-body td {
        padding: 12px 14px;
        border: 1px solid var(--border);
        text-align: left;
      }

      .markdown-body th {
        background: rgba(255, 255, 255, 0.04);
      }

      .markdown-body hr {
        border: 0;
        height: 1px;
        margin: 2em 0;
        background: var(--border);
      }

      .markdown-body img {
        max-width: 100%;
        border-radius: 18px;
      }

      .viewer__footer {
        margin-top: 22px;
        text-align: center;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 18px, 1180px);
          margin-top: 18px;
        }

        .hero__panel {
          padding: 16px;
          border-radius: 20px;
          flex-direction: column;
        }

        .hero__actions {
          width: 100%;
          justify-content: stretch;
        }

        .hero__actions .button {
          flex: 1 1 0;
        }

        .card {
          border-radius: 22px;
          padding: 22px 18px;
        }

        .markdown-body {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <section class="hero__panel">
          <div class="hero__heading">
            <p class="hero__label">MARKDOWN VIEWER</p>
            <p class="hero__path" id="document-path">문서 경로를 준비하는 중...</p>
            <p class="hero__meta" id="document-meta">마크다운 문서를 불러오고 있습니다.</p>
          </div>
          <div class="hero__actions">
            <button class="button" id="copy-link-button" type="button">링크 복사</button>
            <button class="button button--primary" id="scroll-top-button" type="button">
              맨 위로
            </button>
          </div>
        </section>
      </header>

      <main class="viewer">
        <section class="status is-visible" id="status-card" data-state="loading" aria-live="polite">
          <h1 class="status__title" id="status-title">문서를 불러오는 중입니다</h1>
          <p class="status__body" id="status-body">잠시만 기다려 주세요.</p>
          <div class="status__actions hidden" id="status-actions">
            <a class="button" id="default-document-link" href="#">기본 문서 열기</a>
          </div>
        </section>

        <article class="card markdown-body hidden" id="markdown-content"></article>
      </main>

      <footer class="viewer__footer" id="viewer-footer">
        HTML + CSS + JS 기반 Markdown Viewer
      </footer>
    </div>

    <script>
      const DEFAULT_DOCUMENT_PATH =
        "articles/%ED%95%9C_%EA%B6%8C%EC%9C%BC%EB%A1%9C_%EC%9D%BD%EB%8A%94_%EC%BB%B4%ED%93%A8%ED%84%B0%EA%B5%AC%EC%A1%B0%EC%99%80_%ED%94%84%EB%A1%9C%EA%B7%B8%EB%9E%98%EB%B0%8D/00_%EB%93%A4%EC%96%B4%EA%B0%80%EB%A9%B0.md";

      const elements = {
        content: document.getElementById("markdown-content"),
        path: document.getElementById("document-path"),
        meta: document.getElementById("document-meta"),
        footer: document.getElementById("viewer-footer"),
        statusCard: document.getElementById("status-card"),
        statusTitle: document.getElementById("status-title"),
        statusBody: document.getElementById("status-body"),
        statusActions: document.getElementById("status-actions"),
        defaultLink: document.getElementById("default-document-link"),
        copyLinkButton: document.getElementById("copy-link-button"),
        scrollTopButton: document.getElementById("scroll-top-button"),
      };

      const params = new URLSearchParams(window.location.search);
      const requestedDocumentPath =
        params.get("path") || params.get("file") || decodeURIComponent(DEFAULT_DOCUMENT_PATH);

      const markdownScriptCandidates = [
        "https://cdn.jsdelivr.net/npm/marked/marked.min.js",
        "https://unpkg.com/marked/marked.min.js",
      ];

      const highlightScriptCandidates = [
        "https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/common.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js",
      ];

      const highlightStyleCandidates = [
        "https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css",
        "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css",
      ];

      initializeViewer().catch((error) => {
        showError("문서를 불러오지 못했습니다", error.message);
      });

      elements.copyLinkButton.addEventListener("click", async () => {
        const link = buildViewerUrl(normalizePath(requestedDocumentPath)).toString();

        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(link);
          } else {
            const input = document.createElement("input");
            input.value = link;
            document.body.append(input);
            input.select();
            document.execCommand("copy");
            input.remove();
          }

          showTransientMeta("현재 문서 링크를 복사했습니다.", "success");
        } catch (error) {
          showTransientMeta("브라우저에서 링크 복사를 허용하지 않았습니다.", "error");
        }
      });

      elements.scrollTopButton.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      async function initializeViewer() {
        const safePath = normalizePath(requestedDocumentPath);
        elements.path.textContent = safePath;
        elements.meta.textContent = "마크다운 문서를 준비하고 있습니다.";
        elements.defaultLink.href = buildViewerUrl(decodeURIComponent(DEFAULT_DOCUMENT_PATH));

        await Promise.allSettled([
          loadFirstScript(markdownScriptCandidates),
          loadFirstStylesheet(highlightStyleCandidates),
          loadFirstScript(highlightScriptCandidates),
        ]);

        const markdownText = await loadMarkdown(safePath);
        renderMarkdown(markdownText, safePath);
      }

      function normalizePath(rawPath) {
        const input = (rawPath || "").trim().replace(/\\/g, "/");
        const viewerDirectory = window.location.pathname.replace(/[^/]*$/, "");
        let normalized = decodeURIComponent(input);

        if (!normalized) {
          normalized = decodeURIComponent(DEFAULT_DOCUMENT_PATH);
        }

        if (/^[a-z]+:/i.test(normalized) || normalized.startsWith("//")) {
          throw new Error("외부 URL은 불러올 수 없습니다.");
        }

        if (normalized.startsWith(viewerDirectory)) {
          normalized = normalized.slice(viewerDirectory.length);
        }

        normalized = normalized.replace(/^\.?\//, "");

        if (normalized.includes("..")) {
          throw new Error("상위 경로로 이동하는 문서는 열 수 없습니다.");
        }

        if (!normalized.toLowerCase().endsWith(".md")) {
          throw new Error("`.md` 문서만 열 수 있습니다.");
        }

        return normalized;
      }

      async function loadMarkdown(path) {
        showStatus("loading", "문서를 불러오는 중입니다", "문서를 네트워크에서 가져오고 있습니다.");

        const response = await fetch(new URL(path, window.location.href), {
          cache: "no-store",
        });

        if (!response.ok) {
          throw new Error(`문서를 찾지 못했습니다. (HTTP ${response.status})`);
        }

        const buffer = await response.arrayBuffer();
        const markdownText = new TextDecoder("utf-8").decode(buffer);

        if (!markdownText.trim()) {
          throw new Error("문서 내용이 비어 있습니다.");
        }

        return markdownText;
      }

      function renderMarkdown(markdownText, path) {
        const renderedHtml = convertMarkdownToHtml(markdownText);
        elements.content.innerHTML = renderedHtml;
        elements.content.classList.remove("hidden");
        elements.statusCard.classList.remove("is-visible");

        if (window.hljs && typeof window.hljs.highlightElement === "function") {
          elements.content.querySelectorAll("pre code").forEach((block) => {
            window.hljs.highlightElement(block);
          });
        }

        const documentTitle = extractTitle(markdownText) || fileNameFromPath(path);
        document.title = `${documentTitle} | Markdown Viewer`;
        elements.meta.textContent = `${documentTitle} 문서를 표시하고 있습니다.`;
        elements.footer.textContent =
          "마크다운 문서가 정상적으로 렌더링되었습니다.";
      }

      function convertMarkdownToHtml(markdownText) {
        if (window.marked && typeof window.marked.parse === "function") {
          window.marked.use({
            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false,
          });

          return window.marked.parse(markdownText);
        }

        showStatus(
          "info",
          "기본 보기로 전환했습니다",
          "마크다운 라이브러리를 불러오지 못해 원문 텍스트로 표시합니다."
        );

        return `<pre><code>${escapeHtml(markdownText)}</code></pre>`;
      }

      function extractTitle(markdownText) {
        const heading = markdownText.match(/^#\s+(.+)$/m);
        return heading ? heading[1].trim() : "";
      }

      function fileNameFromPath(path) {
        return path.split("/").pop() || "문서";
      }

      function showStatus(state, title, body) {
        elements.statusCard.dataset.state = state;
        elements.statusTitle.textContent = title;
        elements.statusBody.textContent = body;
        elements.statusCard.classList.add("is-visible");
        elements.statusActions.classList.toggle("hidden", state !== "error");
      }

      function showError(title, message) {
        elements.content.classList.add("hidden");
        elements.meta.textContent = "문서를 불러오지 못했습니다.";
        elements.footer.textContent = "경로를 확인한 뒤 다시 시도해 주세요.";
        showStatus("error", title, message);
      }

      function showTransientMeta(message, state) {
        const previous = elements.meta.textContent;
        elements.meta.textContent = message;
        elements.meta.style.color =
          state === "success" ? "var(--success)" : "var(--danger)";

        window.clearTimeout(showTransientMeta.timerId);
        showTransientMeta.timerId = window.setTimeout(() => {
          elements.meta.textContent = previous;
          elements.meta.style.color = "";
        }, 2200);
      }

      async function loadFirstScript(candidates) {
        for (const src of candidates) {
          try {
            await loadScript(src);
            return src;
          } catch (error) {
            // Try the next CDN candidate.
          }
        }

        return null;
      }

      async function loadFirstStylesheet(candidates) {
        for (const href of candidates) {
          try {
            await loadStylesheet(href);
            return href;
          } catch (error) {
            // Try the next CDN candidate.
          }
        }

        return null;
      }

      function loadScript(src) {
        const existing = document.querySelector(`script[data-external="${src}"]`);
        if (existing) {
          return Promise.resolve(src);
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.external = src;
          script.onload = () => resolve(src);
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.head.append(script);
        });
      }

      function loadStylesheet(href) {
        const existing = document.querySelector(`link[data-external="${href}"]`);
        if (existing) {
          return Promise.resolve(href);
        }

        return new Promise((resolve, reject) => {
          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = href;
          link.dataset.external = href;
          link.onload = () => resolve(href);
          link.onerror = () => reject(new Error(`Failed to load ${href}`));
          document.head.append(link);
        });
      }

      function buildViewerUrl(path) {
        const url = new URL(window.location.href);
        url.searchParams.set("path", path);
        return url;
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
    </script>
  </body>
</html>
