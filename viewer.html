<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="eyebrow">Markdown Viewer</div>
        <div id="fileName" class="file-name">파일 경로를 읽는 중...</div>
      </div>

      <div class="topbar-right">
        <button id="copyLinkBtn" class="btn" type="button">링크 복사</button>
        <button id="topBtn" class="btn" type="button">맨 위로</button>
      </div>
    </header>

    <nav id="toc" class="toc" aria-label="문서 목차">
      <h2 class="toc-title">목차</h2>
      <ul id="tocList" class="toc-list"></ul>
    </nav>

    <main id="mainArea">
      <section id="loadingState" class="state">
        <div class="loading-spinner"></div>
        <h2>문서를 불러오는 중입니다</h2>
        <p>잠시만 기다려주세요.</p>
      </section>
    </main>

    <div class="footer-note">
      HTML + CSS + JS 기반 Markdown Viewer
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/kotlin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/sql.min.js"></script>
  <script>
    const mainArea = document.getElementById('mainArea');
    const loadingState = document.getElementById('loadingState');
    const toc = document.getElementById('toc');
    const tocList = document.getElementById('tocList');
    const fileNameEl = document.getElementById('fileName');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const topBtn = document.getElementById('topBtn');

    function getFileParam() {
      const params = new URLSearchParams(window.location.search);
      return params.get('file');
    }

    function getBasePath() {
      const current = window.location.pathname;
      return current.substring(0, current.lastIndexOf('/') + 1);
    }

    function normalizeFilePath(file) {
      if (!file) return null;
      if (/^https?:\/\//i.test(file)) return file;
      if (file.startsWith('/')) return file;
      return getBasePath() + file;
    }

    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function slugify(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/<[^>]*>/g, '')
        .replace(/[^\w가-힣\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: true,
      mangle: false,
      highlight(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      }
    });

    const renderer = new marked.Renderer();

    renderer.heading = function (text, level) {
      const plainText = String(text).replace(/<[^>]*>/g, '').trim();
      const id = slugify(plainText);
      return `<h${level} id="${id}">${text}</h${level}>`;
    };

    renderer.link = function (href, title, text) {
      const safeHref = href || '#';
      const isExternal = /^https?:\/\//i.test(safeHref);
      const titleAttr = title ? ` title="${escapeHtml(title)}"` : '';
      const targetAttr = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
      return `<a href="${escapeHtml(safeHref)}"${titleAttr}${targetAttr}>${text}</a>`;
    };

    renderer.image = function (href, title, text) {
      const titleAttr = title ? ` title="${escapeHtml(title)}"` : '';
      const altAttr = escapeHtml(text || '');
      return `<img src="${escapeHtml(href || '')}" alt="${altAttr}" loading="lazy"${titleAttr} />`;
    };

    function renderError(title, message) {
      toc.classList.remove('show');
      mainArea.innerHTML = `
        <section class="state">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(message)}</p>
        </section>
      `;
    }

    function extractTitle(container) {
      const h1 = container.querySelector('h1');
      if (h1) return h1.textContent.trim();
      return '문서';
    }

    function buildToc(container) {
      const headings = Array.from(
        container.querySelectorAll('h2, h3, h4')
      );

      tocList.innerHTML = '';

      if (headings.length === 0) {
        toc.classList.remove('show');
        return;
      }

      const fragment = document.createDocumentFragment();

      headings.forEach((heading) => {
        if (!heading.id) {
          heading.id = slugify(heading.textContent || 'section');
        }

        const li = document.createElement('li');
        li.className = `toc-level-${heading.tagName.substring(1)}`;

        const a = document.createElement('a');
        a.href = `#${heading.id}`;
        a.textContent = heading.textContent || '';
        li.appendChild(a);
        fragment.appendChild(li);
      });

      tocList.appendChild(fragment);
      toc.classList.add('show');
    }

    function enhanceExternalLinks(container) {
      const links = container.querySelectorAll('a[href]');
      links.forEach((link) => {
        const href = link.getAttribute('href') || '';
        if (/^https?:\/\//i.test(href)) {
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener noreferrer');
        }
      });
    }

    async function loadMarkdown() {
      const fileParam = getFileParam();

      if (!fileParam) {
        fileNameEl.textContent = '파일 경로 없음';
        renderError(
          '파일 경로가 없습니다',
          'URL에 ?file=경로/to/article.md 형식으로 파일 경로를 넣어주세요.'
        );
        return;
      }

      fileNameEl.textContent = fileParam;

      const requestPath = normalizeFilePath(fileParam);

      try {
        const res = await fetch(requestPath, { cache: 'no-store' });

        if (!res.ok) {
          throw new Error(`파일을 불러오지 못했습니다. (${res.status})`);
        }

        const markdown = await res.text();

        if (!markdown.trim()) {
          throw new Error('문서 내용이 비어 있습니다.');
        }

        const html = marked.parse(markdown, { renderer });

        mainArea.innerHTML = `
          <article class="viewer-card">
            <header class="viewer-head">
              <div class="viewer-head-inner">
                <h1 id="docTitle" class="doc-title">문서를 렌더링했습니다</h1>
                <div class="doc-subtitle">${escapeHtml(fileParam)}</div>
              </div>
            </header>
            <section id="content" class="markdown-body">
              ${html}
            </section>
          </article>
        `;

        const content = document.getElementById('content');
        const docTitle = document.getElementById('docTitle');

        enhanceExternalLinks(content);

        content.querySelectorAll('pre code').forEach((block) => {
          hljs.highlightElement(block);
        });

        const title = extractTitle(content);
        docTitle.textContent = title;
        document.title = `${title} | Markdown Viewer`;

        buildToc(content);
      } catch (error) {
        console.error(error);
        renderError('문서를 불러오지 못했습니다', error.message || '알 수 없는 오류가 발생했습니다.');
      }
    }

    copyLinkBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(window.location.href);
        copyLinkBtn.textContent = '복사됨';
        setTimeout(() => {
          copyLinkBtn.textContent = '링크 복사';
        }, 1200);
      } catch (e) {
        alert('링크 복사에 실패했습니다.');
      }
    });

    topBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    loadMarkdown();
  </script>
</body>
</html>
