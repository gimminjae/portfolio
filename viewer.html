<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Viewer</title>
    <meta name="description" content="Markdown viewer" />
    <meta name="color-scheme" content="dark" />
    <style>
      :root {
        --bg: #0b1018;
        --bg-soft: #111827;
        --panel: rgba(20, 27, 40, 0.9);
        --panel-strong: rgba(24, 33, 49, 0.96);
        --panel-muted: rgba(255, 255, 255, 0.03);
        --border: rgba(165, 180, 204, 0.18);
        --border-strong: rgba(165, 180, 204, 0.3);
        --text: #eef4ff;
        --muted: #9aacc7;
        --accent: #8cc8ff;
        --accent-strong: #5eaef7;
        --danger: #ff9d9d;
        --success: #8cd7a8;
        --shadow: 0 28px 70px rgba(0, 0, 0, 0.28);
        --radius-xl: 24px;
        --radius-lg: 20px;
        --radius-md: 16px;
        --content-width: 860px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(90, 140, 255, 0.2), transparent 28%),
          radial-gradient(circle at 84% 12%, rgba(55, 198, 255, 0.14), transparent 22%),
          linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
        font-family:
          "Pretendard Variable",
          "Pretendard",
          "Noto Sans KR",
          "Segoe UI",
          sans-serif;
        line-height: 1.75;
      }

      a {
        color: inherit;
      }

      button {
        font: inherit;
      }

      .shell {
        width: min(1180px, calc(100% - 28px));
        margin: 28px auto 72px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        padding: 18px 20px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .topbar__text {
        min-width: 0;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .file-path {
        margin: 0;
        font-size: clamp(1rem, 1.3vw, 1.18rem);
        font-weight: 700;
        line-height: 1.5;
        word-break: break-all;
      }

      .file-meta {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .topbar__actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        cursor: pointer;
        transition:
          transform 0.16s ease,
          border-color 0.16s ease,
          background 0.16s ease;
      }

      .button:hover {
        transform: translateY(-1px);
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.06);
      }

      .button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .button--primary {
        background: linear-gradient(135deg, rgba(94, 174, 247, 0.26), rgba(67, 112, 255, 0.2));
        border-color: rgba(140, 200, 255, 0.4);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, var(--content-width));
        justify-content: center;
        gap: 18px;
        margin-top: 22px;
      }

      .toc {
        display: none;
        padding: 16px 18px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
      }

      .toc.show {
        display: block;
      }

      .toc__title {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .toc__list {
        margin: 0;
        padding-left: 18px;
      }

      .toc__list li + li {
        margin-top: 8px;
      }

      .toc__list a {
        color: var(--muted);
        text-decoration: none;
      }

      .toc__list a:hover {
        color: var(--accent);
      }

      .card {
        padding: clamp(24px, 5vw, 44px);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
          var(--panel-strong);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
      }

      .state {
        text-align: center;
      }

      .state h2 {
        margin: 0 0 10px;
        font-size: clamp(1.4rem, 2vw, 2rem);
      }

      .state p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .state[data-state="error"] p {
        color: var(--danger);
      }

      .markdown-body {
        font-size: 1.04rem;
        line-height: 1.9;
        color: #e8eef8;
      }

      .markdown-body > *:first-child {
        margin-top: 0;
      }

      .markdown-body > *:last-child {
        margin-bottom: 0;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4 {
        margin: 2.2em 0 0.8em;
        font-weight: 800;
        line-height: 1.3;
        letter-spacing: -0.02em;
      }

      .markdown-body h1 {
        margin-top: 0;
        font-size: clamp(1.9rem, 4vw, 2.8rem);
        padding-bottom: 0.45em;
        border-bottom: 1px solid var(--border);
      }

      .markdown-body h2 {
        font-size: clamp(1.45rem, 3vw, 2rem);
      }

      .markdown-body h3 {
        font-size: clamp(1.15rem, 2.4vw, 1.45rem);
      }

      .markdown-body p,
      .markdown-body ul,
      .markdown-body ol,
      .markdown-body blockquote,
      .markdown-body table,
      .markdown-body pre {
        margin: 1.1em 0;
      }

      .markdown-body ul,
      .markdown-body ol {
        padding-left: 1.4em;
      }

      .markdown-body li + li {
        margin-top: 0.3em;
      }

      .markdown-body strong {
        color: #ffffff;
      }

      .markdown-body a {
        color: var(--accent);
        text-decoration: none;
      }

      .markdown-body a:hover {
        color: var(--accent-strong);
        text-decoration: underline;
      }

      .markdown-body blockquote {
        padding: 0.95em 1.1em;
        border-left: 4px solid rgba(140, 200, 255, 0.75);
        border-radius: 0 14px 14px 0;
        background: rgba(128, 183, 255, 0.08);
      }

      .markdown-body code {
        padding: 0.18em 0.42em;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        font-family:
          "Cascadia Code",
          "Fira Code",
          Consolas,
          monospace;
        font-size: 0.92em;
      }

      .markdown-body pre {
        overflow-x: auto;
        padding: 18px;
        border: 1px solid rgba(140, 164, 196, 0.18);
        border-radius: 18px;
        background: #0a1220;
      }

      .markdown-body pre code {
        padding: 0;
        background: transparent;
        font-size: 0.94rem;
      }

      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-style: hidden;
        border-radius: 16px;
        box-shadow: 0 0 0 1px var(--border);
      }

      .markdown-body th,
      .markdown-body td {
        padding: 12px 14px;
        border: 1px solid var(--border);
        text-align: left;
      }

      .markdown-body th {
        background: rgba(255, 255, 255, 0.04);
      }

      .markdown-body hr {
        border: 0;
        height: 1px;
        margin: 2em 0;
        background: var(--border);
      }

      .markdown-body img {
        max-width: 100%;
        border-radius: 18px;
      }

      .footer-note {
        margin-top: 22px;
        text-align: center;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .hidden {
        display: none;
      }

      @media (min-width: 1120px) {
        .layout.has-toc {
          grid-template-columns: minmax(0, var(--content-width)) 260px;
          align-items: start;
        }

        .layout.has-toc .toc {
          display: block;
          position: sticky;
          top: 24px;
        }
      }

      @media (max-width: 760px) {
        .shell {
          width: min(100% - 18px, 1180px);
          margin-top: 18px;
        }

        .topbar {
          flex-direction: column;
          padding: 16px;
          border-radius: 20px;
        }

        .topbar__actions {
          width: 100%;
          justify-content: stretch;
        }

        .topbar__actions .button {
          flex: 1 1 0;
        }

        .card {
          padding: 22px 18px;
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="topbar__text">
          <p class="eyebrow">MARKDOWN VIEWER</p>
          <p class="file-path" id="fileName">문서 경로를 준비하는 중...</p>
          <p class="file-meta" id="metaText">마크다운 문서를 불러오고 있습니다.</p>
        </div>
        <div class="topbar__actions">
          <button class="button" id="copyLinkBtn" type="button">링크 복사</button>
          <button class="button button--primary" id="topBtn" type="button">맨 위로</button>
        </div>
      </header>

      <div class="layout" id="layout">
        <main id="mainArea" class="card">
          <section id="loadingState" class="state" data-state="loading">
            <h2>문서를 불러오는 중입니다</h2>
            <p>잠시만 기다려 주세요.</p>
          </section>
        </main>

        <nav id="toc" class="toc" aria-label="문서 목차">
          <h2 class="toc__title">목차</h2>
          <ul id="tocList" class="toc__list"></ul>
        </nav>
      </div>

      <div class="footer-note" id="footerNote">HTML + CSS + JS 기반 Markdown Viewer</div>
    </div>

    <script>
      const DEFAULT_FILE =
        "articles/%ED%95%9C_%EA%B6%8C%EC%9C%BC%EB%A1%9C_%EC%9D%BD%EB%8A%94_%EC%BB%B4%ED%93%A8%ED%84%B0%EA%B5%AC%EC%A1%B0%EC%99%80_%ED%94%84%EB%A1%9C%EA%B7%B8%EB%9E%98%EB%B0%8D/00_%EB%93%A4%EC%96%B4%EA%B0%80%EB%A9%B0.md";

      const MARKED_SOURCES = [
        "https://cdn.jsdelivr.net/npm/marked/marked.min.js",
        "https://unpkg.com/marked/marked.min.js",
      ];

      const HIGHLIGHT_SCRIPT_SOURCES = [
        "https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/highlight.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js",
      ];

      const HIGHLIGHT_STYLE_SOURCES = [
        "https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css",
        "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css",
      ];

      const elements = {
        mainArea: document.getElementById("mainArea"),
        toc: document.getElementById("toc"),
        tocList: document.getElementById("tocList"),
        fileName: document.getElementById("fileName"),
        metaText: document.getElementById("metaText"),
        footerNote: document.getElementById("footerNote"),
        copyLinkBtn: document.getElementById("copyLinkBtn"),
        topBtn: document.getElementById("topBtn"),
        layout: document.getElementById("layout"),
      };

      elements.copyLinkBtn.addEventListener("click", copyCurrentLink);
      elements.topBtn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      init().catch((error) => {
        console.error(error);
        renderError("문서를 불러오지 못했습니다", error.message || "알 수 없는 오류가 발생했습니다.");
      });

      async function init() {
        const fileParam = getFileParam();
        const safePath = normalizeFilePath(fileParam);

        elements.fileName.textContent = safePath;
        elements.metaText.textContent = "마크다운 문서를 준비하고 있습니다.";

        await Promise.allSettled([
          loadFirstScript(MARKED_SOURCES),
          loadFirstStylesheet(HIGHLIGHT_STYLE_SOURCES),
          loadFirstScript(HIGHLIGHT_SCRIPT_SOURCES),
        ]);

        const markdown = await fetchMarkdown(safePath);
        renderMarkdown(markdown, safePath);
      }

      function getFileParam() {
        const params = new URLSearchParams(window.location.search);
        return params.get("file") || params.get("path") || decodeURIComponent(DEFAULT_FILE);
      }

      function normalizeFilePath(file) {
        const value = (file || "").trim().replace(/\\/g, "/");

        if (!value) {
          return decodeURIComponent(DEFAULT_FILE);
        }

        if (/^[a-z]+:/i.test(value) || value.startsWith("//")) {
          throw new Error("외부 URL은 불러올 수 없습니다.");
        }

        if (value.includes("..")) {
          throw new Error("상위 경로로 이동하는 문서는 열 수 없습니다.");
        }

        if (!value.toLowerCase().endsWith(".md")) {
          throw new Error("`.md` 문서만 열 수 있습니다.");
        }

        return value.replace(/^\.?\//, "");
      }

      async function fetchMarkdown(path) {
        const response = await fetch(new URL(path, window.location.href), {
          cache: "no-store",
        });

        if (!response.ok) {
          throw new Error(`문서를 찾지 못했습니다. (HTTP ${response.status})`);
        }

        const buffer = await response.arrayBuffer();
        const markdown = new TextDecoder("utf-8").decode(buffer);

        if (!markdown.trim()) {
          throw new Error("문서 내용이 비어 있습니다.");
        }

        return markdown;
      }

      function renderMarkdown(markdown, path) {
        const html = convertMarkdownToHtml(markdown);

        elements.mainArea.innerHTML = `
          <article class="markdown-body" id="content">${html}</article>
        `;

        const content = document.getElementById("content");
        const title = extractTitle(markdown) || fileNameFromPath(path);

        enhanceExternalLinks(content);
        applyHighlight(content);
        buildToc(content);

        document.title = `${title} | Markdown Viewer`;
        elements.metaText.textContent = `${title} 문서를 표시하고 있습니다.`;
        elements.footerNote.textContent = "마크다운 문서가 정상적으로 렌더링되었습니다.";
      }

      function convertMarkdownToHtml(markdown) {
        if (window.marked && typeof window.marked.parse === "function") {
          window.marked.use({
            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false,
          });

          return window.marked.parse(markdown);
        }

        return `<pre><code>${escapeHtml(markdown)}</code></pre>`;
      }

      function applyHighlight(container) {
        if (!window.hljs || typeof window.hljs.highlightElement !== "function") {
          return;
        }

        container.querySelectorAll("pre code").forEach((block) => {
          window.hljs.highlightElement(block);
        });
      }

      function buildToc(container) {
        const headings = Array.from(container.querySelectorAll("h2, h3, h4"));
        elements.tocList.innerHTML = "";

        if (headings.length === 0) {
          elements.toc.classList.remove("show");
          elements.layout.classList.remove("has-toc");
          return;
        }

        const fragment = document.createDocumentFragment();

        headings.forEach((heading) => {
          if (!heading.id) {
            heading.id = slugify(heading.textContent || "section");
          }

          const item = document.createElement("li");
          const link = document.createElement("a");
          link.href = `#${heading.id}`;
          link.textContent = heading.textContent || "";
          item.appendChild(link);
          fragment.appendChild(item);
        });

        elements.tocList.appendChild(fragment);
        elements.toc.classList.add("show");
        elements.layout.classList.add("has-toc");
      }

      function enhanceExternalLinks(container) {
        container.querySelectorAll("a[href]").forEach((link) => {
          const href = link.getAttribute("href") || "";
          if (/^https?:\/\//i.test(href)) {
            link.target = "_blank";
            link.rel = "noopener noreferrer";
          }
        });
      }

      function extractTitle(markdown) {
        const match = markdown.match(/^#\s+(.+)$/m);
        return match ? match[1].trim() : "";
      }

      function fileNameFromPath(path) {
        return path.split("/").pop() || "문서";
      }

      function renderError(title, message) {
        elements.mainArea.innerHTML = `
          <section class="state" data-state="error">
            <h2>${escapeHtml(title)}</h2>
            <p>${escapeHtml(message)}</p>
          </section>
        `;
        elements.toc.classList.remove("show");
        elements.layout.classList.remove("has-toc");
        elements.metaText.textContent = "문서를 불러오지 못했습니다.";
        elements.footerNote.textContent = "경로를 확인한 뒤 다시 시도해 주세요.";
      }

      async function copyCurrentLink() {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(window.location.href);
          } else {
            const input = document.createElement("input");
            input.value = window.location.href;
            document.body.appendChild(input);
            input.select();
            document.execCommand("copy");
            input.remove();
          }

          flashMeta("현재 문서 링크를 복사했습니다.", "success");
        } catch (error) {
          flashMeta("브라우저에서 링크 복사를 허용하지 않았습니다.", "error");
        }
      }

      function flashMeta(message, type) {
        const previousText = elements.metaText.textContent;
        const previousColor = elements.metaText.style.color;

        elements.metaText.textContent = message;
        elements.metaText.style.color = type === "success" ? "var(--success)" : "var(--danger)";

        window.clearTimeout(flashMeta.timerId);
        flashMeta.timerId = window.setTimeout(() => {
          elements.metaText.textContent = previousText;
          elements.metaText.style.color = previousColor;
        }, 2200);
      }

      async function loadFirstScript(candidates) {
        for (const src of candidates) {
          try {
            await loadScript(src);
            return src;
          } catch (error) {
            // Try the next CDN.
          }
        }

        return null;
      }

      async function loadFirstStylesheet(candidates) {
        for (const href of candidates) {
          try {
            await loadStylesheet(href);
            return href;
          } catch (error) {
            // Try the next CDN.
          }
        }

        return null;
      }

      function loadScript(src) {
        if (document.querySelector(`script[data-external="${src}"]`)) {
          return Promise.resolve(src);
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.external = src;
          script.onload = () => resolve(src);
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.head.appendChild(script);
        });
      }

      function loadStylesheet(href) {
        if (document.querySelector(`link[data-external="${href}"]`)) {
          return Promise.resolve(href);
        }

        return new Promise((resolve, reject) => {
          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = href;
          link.dataset.external = href;
          link.onload = () => resolve(href);
          link.onerror = () => reject(new Error(`Failed to load ${href}`));
          document.head.appendChild(link);
        });
      }

      function slugify(text) {
        return String(text)
          .toLowerCase()
          .trim()
          .replace(/<[^>]*>/g, "")
          .replace(/[^\w\u3131-\uD79D\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-");
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
    </script>
  </body>
</html>
